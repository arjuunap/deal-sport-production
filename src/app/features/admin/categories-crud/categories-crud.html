<div class="crud-container">
    <div class="crud-header">
        <h2>Manage Categories</h2>
        <button class="btn btn-primary" (click)="openAddModal()">
            <span class="material-icons-round">add</span>
            <span>Add Category</span>
        </button>
    </div>

    <div class="card table-wrapper">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name (EN)</th>
                    <th>Name (AR)</th>
                    <!-- <th>Icon Slug</th> -->
                    <!-- <th>Parent ID</th> -->
                    <th>Sort Order</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let cat of categories">
                    <td>{{ cat.id }}</td>
                    <td>{{ cat.nameEn}}</td>
                    <td>{{ cat.nameAr }}</td>
                    <!-- <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <span class="material-icons-round text-primary">{{ cat.iconSlug }}</span>
                  <code>{{ cat.iconSlug }}</code>
                </div>
              </td> -->
                    <!-- <td>{{ cat.parentId || 'None (Root)' }}</td> -->
                    <td>{{ cat.sortOrder }}</td>
                    <td>
                        <span class="badge" [class.badge-featured]="cat.is_active === 1"
                            [class.badge-discount]="cat.is_active === 0">
                            {{ cat.is_active === 1 ? 'Active' : 'Inactive' }}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons-cell">
                            <button class="btn-icon" (click)="openEditModal(cat)" title="Edit"><span
                                    class="material-icons-round">edit</span></button>
                            <button class="btn-icon text-danger" (click)="deleteCategory(cat.id)" title="Delete"><span
                                    class="material-icons-round">delete</span></button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <h3>{{ editingCategoryId ? 'Edit Category' : 'Add Category' }}</h3>
                <button class="btn-icon border-none" (click)="closeModal()"><span
                        class="material-icons-round">close</span></button>
            </div>
            <div class="modal-body">
                <form [formGroup]="catForm" (submit)="onSubmit()" class="auth-form">
                    <div class="form-group">
                        <label class="form-label">Category Name (EN)</label>
                        <input type="text" formControlName="nameEn" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category Name (AR)</label>
                        <input type="text" formControlName="nameAr" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Icon Slug (Material Icon name)</label>
                        <input type="text" formControlName="iconSlug" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parent Category</label>
                        <select formControlName="parentId" class="form-control">
                            <option [ngValue]="null">None (Root Category)</option>
                            <option *ngFor="let c of parentCategories" [value]="c.id">{{ c.nameEn}}</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sort Order</label>
                        <input type="number" formControlName="sortOrder" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Category Image</label>
                        <div class="file-upload-box">
                            <input type="file" (change)="onFileSelected($event)" accept="image/*">
                        </div>
                    </div>
                    <div class="form-group checkbox-label">
                        <input type="checkbox" formControlName="isActive">
                        <span>Active Status</span>
                    </div>
                    <button type="submit" [disabled]="catForm.invalid" class="btn btn-primary w-full">Save
                        Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
