<div class="crud-container">
      <div class="crud-header">
        <h2>Manage Cities</h2>
        <button class="btn btn-primary" (click)="openAddModal()">
          <span class="material-icons-round">add</span>
          <span>Add City</span>
        </button>
      </div>

      <!-- Cities Table -->
      <div class="card table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name (EN)</th>
              <th>Name (AR)</th>
              <th>Region Code</th>
              <th>Latitude</th>
              <th>Longitude</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let c of cities()">
              <td>{{ c.id }}</td>
              <td>{{ c.nameEn }}</td>
              <td>{{ c.nameAr }}</td>
              <td><code>{{ c.regionCode }}</code></td>
              <td>{{ c.latitude }}</td>
              <td>{{ c.longitude }}</td>
              <td>
                <span class="badge" [class.badge-featured]="c.is_active === 1" [class.badge-discount]="c.is_active === 0">
                  {{ c.is_active === 1 ? 'Active' : 'Inactive' }}
                </span>
              </td>
              <td>
                <div class="action-buttons-cell">
                  <button class="btn-icon" (click)="openEditModal(c)" title="Edit"><span class="material-icons-round">edit</span></button>
                  <button class="btn-icon text-danger" (click)="deleteCity(c.id)" title="Delete"><span class="material-icons-round">delete</span></button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Add/Edit Modal -->
      <div class="modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
          <div class="modal-header">
            <h3>{{ editingCityId ? 'Edit City' : 'Add New City' }}</h3>
            <button class="btn-icon border-none" (click)="closeModal()"><span class="material-icons-round">close</span></button>
          </div>
          <div class="modal-body">
            <form [formGroup]="cityForm" (submit)="onSubmit()" class="auth-form">
              <div class="form-group">
                <label class="form-label">Name (English)</label>
                <input type="text" formControlName="name_en" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Name (Arabic)</label>
                <input type="text" formControlName="name_ar" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Region Code (e.g. RUH)</label>
                <input type="text" formControlName="region_code" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Latitude</label>
                <input type="number" step="0.0001" formControlName="latitude" class="form-control">
              </div>
              <div class="form-group">
                <label class="form-label">Longitude</label>
                <input type="number" step="0.0001" formControlName="longitude" class="form-control">
              </div>
              <div class="form-group checkbox-label">
                <input type="checkbox" formControlName="is_active">
                <span>Active Status</span>
              </div>
              <button type="submit" [disabled]="cityForm.invalid" class="btn btn-primary w-full">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
